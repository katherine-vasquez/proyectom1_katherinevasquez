<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Generador de Paletas de Colores</title>
    
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header>
        <h1>Generador de Paletas de Colores</h1>
    </header>   
    
    <main>
        <section class="controls">
       <label for="paletteSize">Tamaño de la paleta:</label>

       <select id="paletteSize">
           <option value="6">6 colores</option>
           <option value="8">8 colores</option> 
           <option value="9">9 colores</option>

           </select>  
              <button id="generateBtn">Generar Paleta</button>

        </section>
    </main>

</body>
</html>
